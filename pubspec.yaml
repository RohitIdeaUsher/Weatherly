name: weatherly
description: "A new Flutter project."

publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  cupertino_icons: ^1.0.6
  dio: ^5.7.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.14
  geocoding: ^3.0.0
  geolocator: ^13.0.2
  get_it: ^8.0.2
  internet_connection_checker_plus: ^2.5.2
  intl: ^0.19.0
  riverpod_annotation: ^2.6.1
  

dev_dependencies:
  build_runner: ^2.4.13
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  riverpod_generator: ^2.6.2
  riverpod_lint: ^2.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/img/
    - assets/myJson/
    - assets/svg/
    - assets/
    - env.json
